<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発車メロディDB | 検索</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      background: #f5f5f5;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #1f2937;
      color: #fff;
      padding: 28px 20px;
    }

    header .inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    header h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }

    header p {
      margin: 0;
      color: #d1d5db;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto 60px;
      padding: 0 16px;
    }

    .search-box {
      background: #fff;
      border: 1px solid #d1d5db;
      padding: 20px;
      margin-bottom: 28px;
    }

    .search-box h2 {
      margin: 0 0 10px 0;
      font-size: 1.25rem;
    }

    .search-box p {
      margin: 0 0 14px 0;
      color: #666;
      font-size: 0.95rem;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid #bbb;
      outline: none;
    }

    .search-input:focus {
      border-color: #2563eb;
    }

    .section {
      margin-bottom: 40px;
    }

    .section-title {
      margin: 0 0 14px 0;
      padding-left: 12px;
      border-left: 6px solid #2563eb;
      font-size: 1.45rem;
    }

    .result-info {
      margin: 0 0 14px 0;
      color: #666;
      font-size: 0.95rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .basic-card {
      background: #fff;
      border: 1px solid #cfcfcf;
      padding: 18px 20px;
    }

    .basic-card h3 {
      margin: 0 0 10px 0;
      font-size: 1.2rem;
      line-height: 1.4;
    }

    .basic-card h3 a {
      color: #111;
      text-decoration: none;
    }

    .basic-card h3 a:hover {
      text-decoration: underline;
    }

    .subtext {
      color: #444;
      font-size: 0.98rem;
    }

    .meta-line {
      margin-top: 8px;
      color: #555;
      font-size: 0.95rem;
    }

    /* 路線カード */
    .line-card {
      display: flex;
      align-items: stretch;
      background: #fff;
      border: 1px solid #b9b9b9;
      min-height: 190px;
    }

    .line-color-bar {
      width: 52px;
      flex-shrink: 0;
      background: #999;
    }

    .line-card-body {
      display: flex;
      align-items: center;
      gap: 34px;
      padding: 28px 34px;
      width: 100%;
    }

    .jr-icon-box {
      width: 132px;
      height: 132px;
      border: 12px solid #118c8f;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fff;
    }

    .jr-icon-text {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      color: #000;
      letter-spacing: -2px;
    }

    .line-info {
      min-width: 0;
    }

    .line-info h3 {
      margin: 0 0 20px 0;
      font-size: 3rem;
      line-height: 1.15;
      font-weight: 700;
    }

    .line-info h3 a {
      color: #000;
      text-decoration: none;
    }

    .line-info h3 a:hover {
      text-decoration: underline;
    }

    .line-reading {
      font-size: 2rem;
      color: #111;
      line-height: 1.35;
      word-break: break-word;
    }

    .empty {
      background: #fff;
      border: 1px dashed #bbb;
      padding: 18px 20px;
      color: #666;
    }

    footer {
      text-align: center;
      color: #777;
      font-size: 0.9rem;
      padding: 24px 16px 40px;
    }

    @media (max-width: 900px) {
      .line-card {
        min-height: auto;
      }

      .line-card-body {
        gap: 20px;
        padding: 20px;
      }

      .jr-icon-box {
        width: 96px;
        height: 96px;
        border-width: 9px;
      }

      .jr-icon-text {
        font-size: 46px;
      }

      .line-info h3 {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .line-reading {
        font-size: 1.35rem;
      }
    }

    @media (max-width: 640px) {
      .line-card-body {
        flex-direction: column;
        align-items: flex-start;
      }

      .line-color-bar {
        width: 18px;
      }

      .line-info h3 {
        font-size: 1.6rem;
      }

      .line-reading {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <h1>発車メロディDB</h1>
      <p>駅・路線・メロディを検索できます。</p>
    </div>
  </header>

  <main class="container">
    <section class="search-box">
      <h2>検索</h2>
      <p>駅名・路線名・メロディ名で検索できます。</p>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="例：会津若松 / 吾妻線 / 小川のせせらぎ"
      >
    </section>

    <section class="section">
      <h2 class="section-title">駅検索</h2>
      <p class="result-info" id="stationResultInfo">0件</p>
      <div id="stationResults" class="card-grid"></div>
    </section>

    <section class="section">
      <h2 class="section-title">路線検索</h2>
      <p class="result-info" id="lineResultInfo">0件</p>
      <div id="lineResults" class="card-grid"></div>
    </section>

    <section class="section">
      <h2 class="section-title">メロディ検索</h2>
      <p class="result-info" id="melodyResultInfo">0件</p>
      <div id="melodyResults" class="card-grid"></div>
    </section>
  </main>

  <footer>
    発車メロディDB
  </footer>

  <script src="stations.js"></script>
  <script src="lines.js"></script>
  <script src="melodies.js"></script>

  <script>
    const searchInput = document.getElementById("searchInput");

    const stationResultsEl = document.getElementById("stationResults");
    const lineResultsEl = document.getElementById("lineResults");
    const melodyResultsEl = document.getElementById("melodyResults");

    const stationResultInfoEl = document.getElementById("stationResultInfo");
    const lineResultInfoEl = document.getElementById("lineResultInfo");
    const melodyResultInfoEl = document.getElementById("melodyResultInfo");

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .trim();
    }

    function safeArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function joinLines(lines) {
      const arr = safeArray(lines).filter(Boolean);
      return arr.length ? arr.join(" / ") : "情報なし";
    }

    function getLineColor(line) {
      return line.color || "#999999";
    }

    function getStationSearchText(station) {
      return [
        station.name,
        station.kana,
        station.roman,
        ...safeArray(station.lines)
      ].join(" ");
    }

    function getLineSearchText(line) {
      return [
        line.name,
        line.kana,
        line.roman
      ].join(" ");
    }

    function getMelodySearchText(melody) {
      return [
        melody.name,
        melody.kana,
        melody.roman
      ].join(" ");
    }

    function renderEmpty(container, message) {
      container.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function renderStations(items) {
      stationResultInfoEl.textContent = `${items.length}件`;

      if (!items.length) {
        renderEmpty(stationResultsEl, "該当する駅は見つかりませんでした。");
        return;
      }

      stationResultsEl.innerHTML = items.map(station => {
        const name = station.name || "名称未設定";
        const file = station.file || "#";
        const kana = station.kana || "情報なし";
        const roman = station.roman || "情報なし";
        const lines = joinLines(station.lines);

        return `
          <article class="basic-card">
            <h3><a href="${escapeHtml(file)}">${escapeHtml(name)}</a></h3>
            <div class="subtext">${escapeHtml(kana)} / ${escapeHtml(roman)}</div>
            <div class="meta-line">路線：${escapeHtml(lines)}</div>
          </article>
        `;
      }).join("");
    }

    function renderLines(items) {
      lineResultInfoEl.textContent = `${items.length}件`;

      if (!items.length) {
        renderEmpty(lineResultsEl, "該当する路線は見つかりませんでした。");
        return;
      }

      lineResultsEl.innerHTML = items.map(line => {
        const name = line.name || "名称未設定";
        const file = line.file || "#";
        const kana = line.kana || "";
        const roman = line.roman || "";
        const color = getLineColor(line);

        return `
          <article class="line-card">
            <div class="line-color-bar" style="background:${escapeHtml(color)};"></div>
            <div class="line-card-body">
              <div class="jr-icon-box">
                <div class="jr-icon-text">JR</div>
              </div>
              <div class="line-info">
                <h3><a href="${escapeHtml(file)}">${escapeHtml(name)}</a></h3>
                <div class="line-reading">${escapeHtml(kana)} / ${escapeHtml(roman)}</div>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderMelodies(items) {
      melodyResultInfoEl.textContent = `${items.length}件`;

      if (!items.length) {
        renderEmpty(melodyResultsEl, "該当するメロディは見つかりませんでした。");
        return;
      }

      melodyResultsEl.innerHTML = items.map(melody => {
        const name = melody.name || "名称未設定";
        const file = melody.file || "#";
        const kana = melody.kana || "情報なし";
        const roman = melody.roman || "情報なし";

        return `
          <article class="basic-card">
            <h3><a href="${escapeHtml(file)}">${escapeHtml(name)}</a></h3>
            <div class="subtext">${escapeHtml(kana)} / ${escapeHtml(roman)}</div>
          </article>
        `;
      }).join("");
    }

    function renderAll() {
      const query = normalizeText(searchInput.value);

      const stationData = Array.isArray(window.stations) ? window.stations : [];
      const lineData = Array.isArray(window.lines) ? window.lines : [];
      const melodyData = Array.isArray(window.melodies) ? window.melodies : [];

      const filteredStations = !query
        ? stationData
        : stationData.filter(station =>
            normalizeText(getStationSearchText(station)).includes(query)
          );

      const filteredLines = !query
        ? lineData
        : lineData.filter(line =>
            normalizeText(getLineSearchText(line)).includes(query)
          );

      const filteredMelodies = !query
        ? melodyData
        : melodyData.filter(melody =>
            normalizeText(getMelodySearchText(melody)).includes(query)
          );

      renderStations(filteredStations);
      renderLines(filteredLines);
      renderMelodies(filteredMelodies);
    }

    searchInput.addEventListener("input", renderAll);
    renderAll();
  </script>
</body>
</html>
