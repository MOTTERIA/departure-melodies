<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発車メロディDB | 検索</title>
  <style>
    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #1f2937;
      color: #fff;
      padding: 20px;
    }

    main {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
    }

    h2 {
      margin-top: 30px;
      border-left: 5px solid #2563eb;
      padding-left: 10px;
    }

    .card {
      background: #fff;
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 10px;
    }

    /* 路線カード */
    .line-card {
      display: flex;
      background: #fff;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .line-color {
      width: 10px;
    }

    .line-body {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }

    .line-text h3 {
      margin: 0;
      font-size: 16px;
    }

    .line-sub {
      font-size: 14px;
      color: #555;
    }

    .line-count {
      font-size: 13px;
      color: #666;
    }

    .empty {
      background: #fff;
      border: 1px dashed #ccc;
      padding: 10px;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  <h1>発車メロディDB</h1>
</header>

<main>

  <input id="searchInput" placeholder="検索">

  <h2>駅検索</h2>
  <div id="stationResults"></div>

  <h2>路線検索</h2>
  <div id="lineResults"></div>

  <h2>メロディ検索</h2>
  <div id="melodyResults"></div>

</main>

<script src="stations.js"></script>
<script src="lines.js"></script>
<script src="melodies.js"></script>

<script>
function norm(t){
  return (t||"").toLowerCase().replace(/\s/g,"");
}

function search(){
  const q = norm(document.getElementById("searchInput").value);

  const sBox = document.getElementById("stationResults");
  const lBox = document.getElementById("lineResults");
  const mBox = document.getElementById("melodyResults");

  /* 駅 */
  const sList = (typeof stations !== "undefined" ? stations : []).filter(s =>
    norm(s.name + s.kana + s.roman + (s.lines||[]).join(" ")).includes(q)
  );

  sBox.innerHTML = sList.length ? sList.map(s => `
    <div class="card">
      <b><a href="${s.file}">${s.name}</a></b><br>
      ${s.kana || ""}<br>
      ${(s.lines||[]).join(" / ")}
    </div>
  `).join("") : `<div class="empty">該当なし</div>`;

  /* 路線 */
  const lList = (typeof lines !== "undefined" ? lines : []).filter(l =>
    norm(l.name + l.kana + l.roman).includes(q)
  );

  lBox.innerHTML = lList.length ? lList.map(l => `
    <div class="line-card">
      <div class="line-color" style="background:${l.color};"></div>
      <div class="line-body">
        <img src="images/jr.png" style="width:40px;height:40px;">
        <div class="line-text">
          <h3><a href="${l.file}">${l.name}</a></h3>
          <div class="line-sub">${l.kana} / ${l.roman}</div>
          <div class="line-count">登録駅数：${l.stationOrder ? l.stationOrder.length : 0}駅</div>
        </div>
      </div>
    </div>
  `).join("") : `<div class="empty">該当なし</div>`;

  /* メロディ */
  const mList = (typeof melodies !== "undefined" ? melodies : []).filter(m =>
    norm(m.name + m.kana + m.roman).includes(q)
  );

  mBox.innerHTML = mList.length ? mList.map(m => `
    <div class="card">
      <b><a href="${m.file}">${m.name}</a></b><br>
      ${m.kana || ""}<br>
      ${m.roman || ""}
    </div>
  `).join("") : `<div class="empty">該当なし</div>`;
}

document.getElementById("searchInput").addEventListener("input", search);
search();
</script>

</body>
</html>
