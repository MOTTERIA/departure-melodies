<script src="../stations.js"></script>
<script src="../lines.js"></script>
<script>
function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderTadamiStations() {
  const stationList = document.getElementById("stationList");

  const lineData = lines.find(line => line.name === "只見線");
  if (!lineData) {
    stationList.innerHTML = `<div class="empty-message">只見線データがありません。</div>`;
    return;
  }

  const order = Array.isArray(lineData.stationOrder) ? lineData.stationOrder : [];

  const stationMap = new Map(
    stations.map(station => [station.name, station])
  );

  const orderedStations = order
    .map(name => stationMap.get(name))
    .filter(Boolean);

  if (!orderedStations.length) {
    stationList.innerHTML = `<div class="empty-message">只見線の駅データがありません。</div>`;
    return;
  }

  stationList.innerHTML = orderedStations.map(station => `
    <a class="station-card" href="../${station.file}">
      <div class="station-name">${escapeHtml(station.name)}</div>
      <div class="station-sub">${escapeHtml(station.kana)} / ${escapeHtml(station.roman)}</div>
    </a>
  `).join("");
}

window.addEventListener("DOMContentLoaded", renderTadamiStations);
</script>
