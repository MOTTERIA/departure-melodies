      <div>start: <span id="startVal"></span></div>
      <button onclick="adjustStart(-0.001)">↓</button>
      <button onclick="adjustStart(0.001)">↑</button>

      <div>end: <span id="endVal"></span></div>

      <button onclick="adjustEnd(0.001)">↑</button>
    </div>

  </div>
</div>

<script>
let ctx, source, buffer;

let start = 0.876;
let end   = 100.414;

const startSpan = document.getElementById("startVal");
const endSpan = document.getElementById("endVal");

function updateDisplay() {
  startSpan.textContent = start.toFixed(3);
  endSpan.textContent = end.toFixed(3);
}

async function loadAudio() {
  if (buffer) return;

  ctx = new (window.AudioContext || window.webkitAudioContext)();

  const res = await fetch("../audio/ost331.mp3");
  const arrayBuffer = await res.arrayBuffer();
  buffer = await ctx.decodeAudioData(arrayBuffer);
}

async function playLoop() {
  await loadAudio();

  if (ctx.state === "suspended") await ctx.resume();
  if (source) source.stop();

  source = ctx.createBufferSource();
  source.buffer = buffer;

  source.loop = true;
  source.loopStart = start;
  source.loopEnd = end;

  source.connect(ctx.destination);
  source.start(0, start);
}

async function preview() {
  await loadAudio();

  if (ctx.state === "suspended") await ctx.resume();
  if (source) source.stop();

  source = ctx.createBufferSource();
  source.buffer = buffer;

  source.loop = true;
  source.loopStart = start;
  source.loopEnd = end;

  source.connect(ctx.destination);

  // 🔥 end直前から再生（重要）
  const previewStart = Math.max(0, end - 2);
  source.start(0, previewStart);
}

function stop() {
  if (source) {
    source.stop();
    source = null;
  }
}

// 🔥 0.001単位調整
function adjustStart(val) {
  start = Math.max(0, start + val);
  updateDisplay();
}

function adjustEnd(val) {
  end = Math.max(start + 0.001, end + val);
  updateDisplay();
}

// 初期表示
updateDisplay();

// ボタン
document.getElementById("playLoop").onclick = playLoop;
document.getElementById("previewBtn").onclick = preview;
document.getElementById("stopBtn").onclick = stop;
</script>
